[Settings]
language = ru
folder = ~/.config/wallpapers
wallpaper = ~/.config/wallpapers/contrstrike.jpg
backend = swaybg
monitors = All
sort = name
color = #ffffff
subfolders = False
show_hidden = False
show_gifs_only = False
post_command = wal -i $wallpaper && fuzzel.sh & sleep 1 & ~/.config/waybar/launch.sh
number_of_columns = 3
use_xdg_state = True
show_transition_options = True
show_path_in_tooltip = True
all_subfolders = False
zen_mode = False
fill = fill
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
stylesheet = ~/.config/waypaper/style.css

