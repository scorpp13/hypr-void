[main]
include=~/.config/fuzzel/wal_fuzzel.ini
dpi-aware=no
icons-enabled=yes
x-margin=6
y-margin=6
width=35
lines=12
font=*:size=14
use-bold=yes
line-height=30
horizontal-pad=20
vertical-pad=20
inner-pad=5
letter-spacing=1
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e
prompt="   "
show-actions=no
image-size-ratio=0.2

[border]
radius=10
width=2

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
