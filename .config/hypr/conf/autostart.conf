# Start Pipewire
exec-once = pipewire.sh

# Setup XDG
exec-once = xdg.sh

# Load environment for hyprland
exec-once = dbus-update-activation-environment --all

# Start Polkit Agent
exec-once = /usr/libexec/hyprpolkitagent

# Start Notification Manager
exec-once = dunst

# Start Autolock
exec-once = hypridle

# Start Screenfilter
exec-once = hyprsunset -t 5500

# Start Cliphist(ory)
exec-once = wl-paste --watch cliphist store

# Initialize wallpaper
exec-once = waypaper --restore

# Autostart apps
exec-once = sleep 5 && udiskie -As
exec-once = sleep 10 && nm-applet
#exec-once = [workspace special silent] sleep 15 && evolution
#exec-once = sleep 15 && blueman-applet
